name: Super CircuitoApp — Build Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      # ─────────────────────────────────────────────────────────────
      # 1. Código fuente
      # ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────
      # 1b. FIJAR el keystore de firma debug (CRÍTICO)
      #     Cada ejecución de GitHub Actions es una máquina nueva. Sin
      #     este paso, Gradle genera un keystore debug ALEATORIO distinto
      #     en cada build → cada APK queda firmado con una firma diferente
      #     → Android RECHAZA instalar/actualizar la app sobre la versión
      #     anterior (falla silenciosa "App no instalada", sin aviso claro)
      #     → el teléfono se queda corriendo la versión vieja para siempre,
      #     sin importar cuántos cambios se suban. Este paso usa siempre
      #     el MISMO keystore para que Android trate cada build como una
      #     actualización legítima de la misma app.
      # ─────────────────────────────────────────────────────────────
      - name: Fijar keystore de firma debug
        run: |
          mkdir -p ~/.android
          echo "" | base64 -d > ~/.android/debug.keystore
          echo "OK — keystore fijo instalado en ~/.android/debug.keystore"
          ls -la ~/.android/debug.keystore

      # ─────────────────────────────────────────────────────────────
      # 2. Entorno
      # ─────────────────────────────────────────────────────────────
      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ─────────────────────────────────────────────────────────────
      # 3. Dependencias npm
      # ─────────────────────────────────────────────────────────────
      - name: npm install
        run: npm install

      # ─────────────────────────────────────────────────────────────
      # 4. Copiar app a www/
      # ─────────────────────────────────────────────────────────────
      - name: Preparar www/
        run: |
          mkdir -p www
          cp index.html www/index.html
          SIZE=$(wc -c < www/index.html)
          echo "index.html: $SIZE bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "ERROR: index.html demasiado pequeño ($SIZE bytes)"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────
      # 5. Capacitor
      # ─────────────────────────────────────────────────────────────
      - name: Crear capacitor.config.json
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.benjamovil.supercircuitoapp",
            "appName": "Super CircuitoApp",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          CAPEOF
          echo "=== capacitor.config.json generado ==="
          cat capacitor.config.json

      # ─────────────────────────────────────────────────────────────
      # 5b. Generar/sincronizar el proyecto Android (Capacitor)
      #     Sin este paso la carpeta android/ nunca existe y todos los
      #     pasos siguientes (íconos, permisos, gradlew) fallan.
      # ─────────────────────────────────────────────────────────────
      - name: Generar proyecto Android
        run: |
          if [ ! -d "android" ]; then
            echo "No existe android/ — creando plataforma con 'npx cap add android'"
            npx cap add android
          else
            echo "android/ ya existe — sincronizando con 'npx cap sync android'"
            npx cap sync android
          fi
          echo "=== Verificando que gradlew exista ==="
          ls -la android/gradlew

      # ─────────────────────────────────────────────────────────────
      # 5c. Plugin nativo: guardar en Descargas de verdad (MediaStore)
      #     Filesystem.writeFile guarda en una carpeta privada de la app
      #     (Android/data/...) que desde Android 11 el sistema OCULTA de
      #     cualquier explorador de archivos — por diseño de Android, no
      #     por un error nuestro. La única forma de que el archivo
      #     aparezca de verdad en "Descargas" es usando MediaStore, la
      #     API que Google exige para esto desde Android 10.
      # ─────────────────────────────────────────────────────────────
      - name: Crear plugin nativo DownloadSaver
        run: |
          PKGDIR="android/app/src/main/java/com/benjamovil/supercircuitoapp"
          mkdir -p "$PKGDIR"
          cat > "$PKGDIR/DownloadSaverPlugin.java" << 'JAVAEOF'
          package com.benjamovil.supercircuitoapp;

          import android.content.ContentValues;
          import android.content.Context;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Environment;
          import android.provider.MediaStore;
          import android.util.Base64;

          import com.getcapacitor.JSObject;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;

          import java.io.OutputStream;

          @CapacitorPlugin(name = "DownloadSaver")
          public class DownloadSaverPlugin extends Plugin {

              @PluginMethod
              public void saveJson(PluginCall call) {
                  String fileName = call.getString("fileName");
                  String base64Data = call.getString("data");
                  if (fileName == null || base64Data == null) {
                      call.reject("Faltan parámetros fileName o data");
                      return;
                  }
                  try {
                      byte[] bytes = Base64.decode(base64Data, Base64.DEFAULT);
                      Context ctx = getContext();
                      ContentValues values = new ContentValues();
                      values.put(MediaStore.MediaColumns.DISPLAY_NAME, fileName);
                      values.put(MediaStore.MediaColumns.MIME_TYPE, "application/json");
                      Uri collection;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                          values.put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOWNLOADS);
                          values.put(MediaStore.MediaColumns.IS_PENDING, 1);
                          collection = MediaStore.Downloads.EXTERNAL_CONTENT_URI;
                      } else {
                          collection = MediaStore.Files.getContentUri("external");
                      }
                      Uri item = ctx.getContentResolver().insert(collection, values);
                      if (item == null) {
                          call.reject("insert() devolvió null — no se pudo crear la entrada en MediaStore");
                          return;
                      }
                      OutputStream out = ctx.getContentResolver().openOutputStream(item);
                      if (out == null) {
                          call.reject("openOutputStream() devolvió null");
                          return;
                      }
                      out.write(bytes);
                      out.flush();
                      out.close();
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                          ContentValues done = new ContentValues();
                          done.put(MediaStore.MediaColumns.IS_PENDING, 0);
                          ctx.getContentResolver().update(item, done, null, null);
                      }
                      JSObject ret = new JSObject();
                      ret.put("uri", item.toString());
                      ret.put("path", "Descargas/" + fileName);
                      call.resolve(ret);
                  } catch (Exception e) {
                      call.reject("Excepción al guardar: " + e.getClass().getSimpleName() + " - " + e.getMessage());
                  }
              }
          }
          JAVAEOF
          echo "=== DownloadSaverPlugin.java creado ==="
          cat "$PKGDIR/DownloadSaverPlugin.java" | head -5

      # ─────────────────────────────────────────────────────────────
      # 6. Redimensionar y copiar íconos con Python + Pillow
      #    (garantiza los 5 tamaños correctos desde cualquier PNG)
      # ─────────────────────────────────────────────────────────────
      - name: Instalar Pillow
        run: pip install Pillow --quiet

      - name: Generar e instalar íconos
        run: |
          python3 << 'PYEOF'
          from PIL import Image
          import os, sys

          # Buscar el ícono fuente (primero xxxhdpi, luego cualquier png en icons/)
          candidates = [
            'icons/ic_launcher_xxxhdpi.png',
            'icons/ic_launcher_xxhdpi.png',
            'icons/ic_launcher_xhdpi.png',
          ]
          src_path = None
          for c in candidates:
            if os.path.exists(c):
              src_path = c
              break
          if not src_path:
            pngs = [f for f in os.listdir('icons') if f.endswith('.png')] if os.path.isdir('icons') else []
            if pngs:
              src_path = 'icons/' + pngs[0]
          if not src_path:
            print('ERROR: No se encontró ningún PNG en icons/')
            sys.exit(1)

          print(f'Usando fuente: {src_path}')
          src = Image.open(src_path).convert('RGBA')

          sizes = {'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
          for name, size in sizes.items():
            dst = f'android/app/src/main/res/mipmap-{name}'
            os.makedirs(dst, exist_ok=True)
            img = src.resize((size,size), Image.LANCZOS)
            img.save(f'{dst}/ic_launcher.png', 'PNG')
            img.save(f'{dst}/ic_launcher_round.png', 'PNG')
            print(f'OK {name}: {size}x{size}px')

          # Foreground adaptive icon (192px)
          big = src.resize((192,192), Image.LANCZOS)
          for name in sizes:
            big.save(f'android/app/src/main/res/mipmap-{name}/ic_launcher_foreground.png','PNG')
          print('OK foreground adaptive')
          PYEOF

      # ─────────────────────────────────────────────────────────────
      # 7. Ícono de notificación (vector blanco)
      # ─────────────────────────────────────────────────────────────
      - name: Notification icon
        run: |
          mkdir -p android/app/src/main/res/drawable
          cat > android/app/src/main/res/drawable/ic_stat_notify.xml << 'XMLEOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
              android:viewportWidth="24" android:viewportHeight="24">
            <path android:fillColor="#FFFFFF"
              android:pathData="M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M11,7V13L15.5,15.5L16.5,13.8L13,12V7H11Z"/>
          </vector>
          XMLEOF
          echo "OK notification icon"

      # ─────────────────────────────────────────────────────────────
      # 8. Permisos en AndroidManifest
      # ─────────────────────────────────────────────────────────────
      - name: Permisos AndroidManifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<uses-permission android:name="android.permission.INTERNET"/>|<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"/>\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM"/>\n    <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS"/>|' "$M"
          echo "OK permisos"

      # ─────────────────────────────────────────────────────────────
      # 8b. FileProvider — necesario para que Share.share() pueda
      #     compartir el archivo de respaldo .json. Sin esto, exportar
      #     el respaldo falla silenciosamente en Android.
      # ─────────────────────────────────────────────────────────────
      - name: Configurar FileProvider para respaldos
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/file_paths.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <cache-path name="cache" path="." />
              <external-path name="external_files" path="." />
              <external-cache-path name="external_cache" path="." />
          </paths>
          XMLEOF
          PROVIDER='    <provider android:name="androidx.core.content.FileProvider" android:authorities="${applicationId}.fileprovider" android:exported="false" android:grantUriPermissions="true"><meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/file_paths" /></provider>'
          if ! grep -q "fileprovider" "$M"; then
            sed -i "s|</application>|$PROVIDER\n</application>|" "$M"
          fi
          echo "OK FileProvider"
          cat "$M"

      # ─────────────────────────────────────────────────────────────
      # 9. build.gradle — SDK y versión
      # ─────────────────────────────────────────────────────────────
      - name: Configurar build.gradle
        run: |
          G="android/app/build.gradle"
          sed -i 's/compileSdk .*/compileSdk 35/' "$G"
          sed -i 's/targetSdk .*/targetSdk 35/' "$G"
          sed -i 's/versionCode [0-9]*/versionCode 1/' "$G"
          sed -i "s/versionName \"[^\"]*\"/versionName \"1.0.0\"/" "$G"
          echo "OK build.gradle"
          grep -E "compileSdk|targetSdk|versionCode|versionName" "$G"

      # ─────────────────────────────────────────────────────────────
      # 10. Registrar plugins Capacitor en MainActivity.java
      # ─────────────────────────────────────────────────────────────
      - name: Registrar plugins en MainActivity
        run: |
          MAIN=$(find android -name "MainActivity.java" 2>/dev/null | head -1)
          echo "Encontrado: $MAIN"
          if [ -z "$MAIN" ]; then echo "ERROR: no se encontró MainActivity.java"; exit 1; fi
          # Imports
          sed -i '/import com.getcapacitor.BridgeActivity;/a import com.capacitorjs.plugins.localnotifications.LocalNotificationsPlugin;\nimport com.capacitorjs.plugins.filesystem.FilesystemPlugin;\nimport com.capacitorjs.plugins.browser.BrowserPlugin;\nimport com.capacitorjs.plugins.share.SharePlugin;\nimport com.benjamovil.supercircuitoapp.DownloadSaverPlugin;' "$MAIN"
          # registerPlugin antes de super.onCreate
          sed -i 's/super.onCreate(savedInstanceState);/registerPlugin(LocalNotificationsPlugin.class);\n    registerPlugin(FilesystemPlugin.class);\n    registerPlugin(BrowserPlugin.class);\n    registerPlugin(SharePlugin.class);\n    registerPlugin(DownloadSaverPlugin.class);\n    super.onCreate(savedInstanceState);/' "$MAIN"
          echo "OK plugins"
          cat "$MAIN"

      # ─────────────────────────────────────────────────────────────
      # 11. Permisos Gradle
      # ─────────────────────────────────────────────────────────────
      - name: Gradle permissions
        run: chmod +x android/gradlew

      # ─────────────────────────────────────────────────────────────
      # 12. Cache Gradle
      # ─────────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ─────────────────────────────────────────────────────────────
      # 13. Build APK (debug — funciona sin keystore, se instala igual)
      # ─────────────────────────────────────────────────────────────
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      # ─────────────────────────────────────────────────────────────
      # 14. Verificar y renombrar APK
      # ─────────────────────────────────────────────────────────────
      - name: Verificar APK
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: APK no encontrado"
            find android/app/build -name "*.apk" 2>/dev/null
            exit 1
          fi
          ls -lh "$APK"
          cp "$APK" "android/app/build/outputs/apk/debug/SuperCircuitoApp-v1.0.0.apk"
          echo "APK listo: SuperCircuitoApp-v1.0.0.apk"

      # ─────────────────────────────────────────────────────────────
      # 15. Subir APK como artifact
      # ─────────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SuperCircuitoApp-v1.0.0
          path: android/app/build/outputs/apk/debug/SuperCircuitoApp-v1.0.0.apk
          retention-days: 90
          if-no-files-found: error

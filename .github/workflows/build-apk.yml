name: Build APK RELEASE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Crear www
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp manifest.json www/manifest.json || true
          cp service-worker.js www/service-worker.js || true

      - name: Capacitor
        run: |
          npx cap add android
          npx cap sync android

      # 🔐 Crear keystore automáticamente
      - name: Generar keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass 123456 \
            -keypass 123456 \
            -dname "CN=App,O=App,L=App,ST=App,C=MX"

      # ⚙️ Configurar firma RELEASE
      - name: Configurar signing
        run: |
          echo "
          android {
            signingConfigs {
              release {
                storeFile file('../../release.keystore')
                storePassword '123456'
                keyAlias 'release'
                keyPassword '123456'
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
                minifyEnabled false
                shrinkResources false
              }
            }
          }
          " >> android/app/build.gradle

      # 🚀 Build RELEASE
      - name: Build APK RELEASE
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      # 📦 Subir APK
      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: super-app-release
          path: android/app/build/outputs/apk/release/app-release.apk      # ─────────────────────────────────────────────────────────────
      # 11. Permisos Gradle
      # ─────────────────────────────────────────────────────────────
      - name: Gradle permissions
        run: chmod +x android/gradlew

      # ─────────────────────────────────────────────────────────────
      # 12. Cache Gradle
      # ─────────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ─────────────────────────────────────────────────────────────
      # 13. Build APK (debug — funciona sin keystore, se instala igual)
      # ─────────────────────────────────────────────────────────────
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      # ─────────────────────────────────────────────────────────────
      # 14. Verificar y renombrar APK
      # ─────────────────────────────────────────────────────────────
      - name: Verificar APK
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "ERROR: APK no encontrado"
            find android/app/build -name "*.apk" 2>/dev/null
            exit 1
          fi
          ls -lh "$APK"
          cp "$APK" "android/app/build/outputs/apk/debug/SuperCircuitoApp-v1.0.0.apk"
          echo "APK listo: SuperCircuitoApp-v1.0.0.apk"

      # ─────────────────────────────────────────────────────────────
      # 15. Subir APK como artifact
      # ─────────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SuperCircuitoApp-v1.0.0
          path: android/app/build/outputs/apk/debug/SuperCircuitoApp-v1.0.0.apk
          retention-days: 90
          if-no-files-found: error
